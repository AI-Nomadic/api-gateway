spring:
  application:
    name: api-gateway

# Downstream service URLs — Docker internal hostnames
gateway:
  routes:
    authService: http://auth-service:8083
    tripService: http://trip-service:8080
    collabService: http://collaboration-service:8082
    aiPlanner: http://ai-planner:8888
  cors:
    allowed-origins: "http://localhost:5173"

app:
  jwt:
    secret: ${JWT_SECRET}
