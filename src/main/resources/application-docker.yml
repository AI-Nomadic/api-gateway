spring:
  application:
    name: api-gateway

# Downstream service URLs — Docker internal hostnames
gateway:
  routes:
    auth-service: http://auth-service:8083
    trip-service: http://trip-service:8080
    collab-service: http://collaboration-service:8082
    ai-planner: http://ai-planner:8888
  cors:
    allowed-origins: ["http://localhost:5173", "http://localhost:3000"]

app:
  jwt:
    secret: ${JWT_SECRET}
