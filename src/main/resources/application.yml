spring:
  application:
    name: api-gateway

server:
  port: 8090

# Downstream service URLs
gateway:
  routes:
    authService: http://localhost:8083
    tripService: http://localhost:8080
    collabService: http://localhost:8082
    aiPlanner: http://localhost:8888
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:5173"

app:
  jwt:
    secret: ${JWT_SECRET:northern-super-secret-key-change-this-in-production-32chars}
